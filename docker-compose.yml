services:

  # ── SQL Server ────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file: .env
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -No -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot: chạy init.sql rồi exit
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file: .env
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql:/sql
    entrypoint: >
      /bin/bash -c "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P $$MSSQL_SA_PASSWORD -No -i /sql/init.sql &&
        echo '[db-init] Done'
      "

  # ── Kafka (KRaft — official Apache image) ────────────────
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9094:9094"   # external access từ host (localhost:9094)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ── Server (TCP + Kafka producer + DB consumer) ───────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # override để dùng internal listener
    ports:
      - "9090:9090"
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Single Thread Server (direct DB write, no Kafka) ────────
  server-single:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    environment:
      SINGLE_THREAD_SERVER_PORT: "9091"
    ports:
      - "9091:9091"
    entrypoint: ["java", "-cp", "app.jar", "com.testvt.server.SingleThreadServer"]
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── Kafka UI ─────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Console Client (interactive) ─────────
  console-client:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      MULTITHREAD_HOST: server
      SINGLE_THREAD_HOST: server-single
      JDBC_URL: jdbc:sqlserver://sqlserver:1433;databaseName=TestVT;encrypt=true;trustServerCertificate=true
      DB_USER: sa
      DB_PASS: YourPassword123!
    entrypoint: ["java", "-cp", "app.jar", "com.testvt.client.ConsoleClient"]
    depends_on:
      - server
      - server-single
    stdin_open: true
    tty: true
    profiles:
      - client


volumes:
  sqldata:
  kafkadata:
